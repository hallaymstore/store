<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Panel — HALLAYM Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Admin Panel</div>
      <nav class="admin-nav">
        <a href="/admin.html" class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0022 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Mahsulotlar</a>
        <a href="/"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Do'konga qaytish</a>
        <a href="/profile.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Profil</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="statProducts">0</div><div class="stat-label">Mahsulotlar</div></div>
        <div class="stat-card"><div class="stat-value" id="statCategories">0</div><div class="stat-label">Kategoriyalar</div></div>
      </div>

      <div class="admin-card">
        <h2 style="font-size:18px;margin-bottom:16px">Yangi mahsulot qo'shish</h2>
        <form id="productForm">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group"><label>Nomi</label><input name="title" required placeholder="Mahsulot nomi"></div>
            <div class="form-group"><label>Narxi (so'm)</label><input name="price" type="number" required placeholder="100000"></div>
            <div class="form-group"><label>Eski narxi</label><input name="oldPrice" type="number" placeholder="Ixtiyoriy"></div>
            <div class="form-group"><label>Kategoriya</label><input name="category" placeholder="electronics, fashion..."></div>
          </div>
          <div class="form-group"><label>Tavsif</label><textarea name="description" rows="3" placeholder="Mahsulot haqida"></textarea></div>
          <div class="form-group"><label>Rasm</label><input type="file" name="image" accept="image/*"></div>
          <button type="submit" class="btn-primary">Mahsulot yaratish</button>
        </form>
      </div>

      <div class="admin-card">
        <h2 style="font-size:18px;margin-bottom:16px">Barcha mahsulotlar</h2>
        <div id="adminProducts"><div class="skeleton" style="height:200px;border-radius:8px"></div></div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
